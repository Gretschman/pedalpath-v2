<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 65">
  <!-- Leads -->
  <line x1="14" y1="55" x2="14" y2="65" stroke="#888" stroke-width="1.5"/>
  <line x1="26" y1="55" x2="26" y2="65" stroke="#888" stroke-width="1.5"/>
  <!-- Body base -->
  <rect x="5" y="12" width="30" height="43" rx="2" fill="#2a3535"/>
  <!-- Domed top -->
  <ellipse cx="20" cy="12" rx="15" ry="5" fill="#2a3535"/>
  <!-- Negative stripe -->
  <rect x="5" y="12" width="10" height="43" fill="rgba(255,255,255,0.18)" rx="1"/>
  <!-- Minus stripe label -->
  <text x="7" y="38" font-size="5" fill="rgba(255,255,255,0.6)" font-family="sans-serif">−−−</text>
  <!-- Plus sign -->
  <text x="22" y="25" font-size="10" font-weight="bold" fill="rgba(255,255,255,0.5)" font-family="sans-serif">+</text>
  <!-- Highlight sheen -->
  <ellipse cx="20" cy="13" rx="10" ry="2" fill="rgba(255,255,255,0.12)"/>
  <!-- Lead notch line -->
  <line x1="5" y1="55" x2="35" y2="55" stroke="#1a2a2a" stroke-width="1"/>
</svg>
