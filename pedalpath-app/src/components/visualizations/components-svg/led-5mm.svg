<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 65">
  <!-- Left lead (cathode, shorter) -->
  <line x1="13" y1="36" x2="13" y2="65" stroke="#888" stroke-width="1.5"/>
  <!-- Right lead (anode, longer) -->
  <line x1="27" y1="33" x2="27" y2="65" stroke="#888" stroke-width="1.5"/>
  <!-- Flat side indicator (cathode side) -->
  <line x1="8" y1="36" x2="16" y2="36" stroke="#555" stroke-width="1"/>
  <!-- Lens body -->
  <circle cx="20" cy="20" r="18" fill="var(--pp-lens-color, #ff4444)" id="led-lens"/>
  <!-- Lens rim -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  <!-- Base flange -->
  <rect x="4" y="33" width="32" height="5" rx="1" fill="#d0d0d0"/>
  <!-- Lens highlight -->
  <ellipse cx="13" cy="11" rx="6" ry="4" fill="rgba(255,255,255,0.45)"/>
  <!-- Lens glow -->
  <circle cx="20" cy="20" r="14" fill="var(--pp-lens-color, #ff4444)" fill-opacity="0.3"/>
</svg>
