<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 55">
  <!-- Left lead (cathode) -->
  <line x1="10" y1="29" x2="10" y2="55" stroke="#888" stroke-width="1.5"/>
  <!-- Right lead (anode) -->
  <line x1="22" y1="27" x2="22" y2="55" stroke="#888" stroke-width="1.5"/>
  <!-- Flat side indicator -->
  <line x1="5" y1="29" x2="13" y2="29" stroke="#555" stroke-width="1"/>
  <!-- Lens body -->
  <circle cx="16" cy="15" r="13" fill="var(--pp-lens-color, #ff4444)" id="led-lens"/>
  <!-- Lens rim -->
  <circle cx="16" cy="15" r="13" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>
  <!-- Base flange -->
  <rect x="3" y="27" width="26" height="4" rx="1" fill="#d0d0d0"/>
  <!-- Lens highlight -->
  <ellipse cx="10" cy="9" rx="5" ry="3" fill="rgba(255,255,255,0.45)"/>
  <!-- Glow -->
  <circle cx="16" cy="15" r="9" fill="var(--pp-lens-color, #ff4444)" fill-opacity="0.3"/>
</svg>
